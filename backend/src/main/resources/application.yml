spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/KBO?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowMultiQueries=true
    username: user
    password: password
    driver-class-name: org.mariadb.jdbc.Driver

  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.kbo.gm
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true
    jdbc-type-for-null: NULL
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

logging:
  level:
    com.kbo.gm: DEBUG
